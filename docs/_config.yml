title: rot documentation
description: Build energetic, platform-ready vertical videos with Python and FFmpeg.
remote_theme: just-the-docs/just-the-docs

# GitHub Pages supports this plugin. The remote theme provides responsive navigation,
# on-page search, accessible headings, and copy buttons for code samples.
plugins:
  - jekyll-remote-theme

search_enabled: true
heading_anchors: true
back_to_top: true
back_to_top_text: "Back to top"
color_scheme: light

aux_links:
  "rot on GitHub": "https://github.com/sbharga/rot"
aux_links_new_tab: true

footer_content: "Built with <a href=\"https://just-the-docs.com\">Just the Docs</a>."

exclude:
  - Gemfile
  - Gemfile.lock
